<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Watches</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: #020617;
}

header h1 {
    margin: 0;
}

.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 40px;
}

.btn {
    background: #38bdf8;
    padding: 12px 20px;
    color: black;
    text-decoration: none;
    border-radius: 5px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>

</head>
<body>

<header>
    <h1>Prime Watches</h1>
    <a href="#" class="btn">Shop Now</a>
</header>

<section class="hero">
    <h2>Timeless Style, Modern Design</h2>
    <p>Premium watches for everyday wear.</p>
    <a href="#" class="btn">Browse Collection</a>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Classic Black Watch</h3>
        <p>₱1,499</p>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Luxury Silver Watch</h3>
        <p>₱1,999</p>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Sport Digital Watch</h3>
        <p>₱1,299</p>
        <a href="#" class="btn">Buy Now</a>
    </div>

</section>

<footer>
    <p>© 2026 Prime Watches</p>
</footer>

</body>
</html>
